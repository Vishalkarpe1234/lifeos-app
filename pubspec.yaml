name: lifeos
description: Vishal Karpe Professional LifeOS - One App. One Life. Everything Connected.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Local Storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.3.3

  # UI & Animations
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Charts
  fl_chart: ^0.69.0

  # Image
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Biometric
  local_auth: ^2.3.0

  # Markdown
  flutter_markdown: ^0.7.4

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  package_info_plus: ^8.1.2
  uuid: ^4.5.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
