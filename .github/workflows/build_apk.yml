name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: flutter --version

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code (non-blocking)
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK (split per ABI)
        run: |
          flutter build apk --release --split-per-abi
          echo "Build completed!"
          ls -la build/app/outputs/flutter-apk/

      - name: Build universal APK
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-APK-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release (on main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: "v1.0.${{ github.run_number }}"
          name: "LifeOS v1.0.${{ github.run_number }}"
          body: |
            ## LifeOS APK Build

            **Install on Android:**
            1. Download `app-arm64-v8a-release.apk` (for modern phones, 64-bit)
            2. Or `app-armeabi-v7a-release.apk` (for older phones, 32-bit)
            3. Enable "Install from unknown sources" in Android Settings > Security
            4. Install the APK
            5. Open LifeOS and configure your backend URL in Settings

            **Backend:** Start your FastAPI backend and configure the URL in app Settings.
          artifacts: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
