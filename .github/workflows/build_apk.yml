name: Build VK OS APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Set up release keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using stored keystore from secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/vkos-release.jks
            echo "storeFile=vkos-release.jks" > android/key.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          else
            echo "Generating a new release keystore for this build..."
            keytool -genkeypair -v \
              -keystore android/app/vkos-release.jks \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -alias vkos \
              -dname "CN=Vishal Karpe, OU=HiveTech, O=VK OS, L=Pune, S=Maharashtra, C=IN" \
              -storepass VKOSApp2024 \
              -keypass VKOSApp2024
            echo "storeFile=vkos-release.jks" > android/key.properties
            echo "storePassword=VKOSApp2024" >> android/key.properties
            echo "keyAlias=vkos" >> android/key.properties
            echo "keyPassword=VKOSApp2024" >> android/key.properties
            echo "KEYSTORE_BASE64=$(base64 -w 0 android/app/vkos-release.jks)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code (non-blocking)
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APKs (split per ABI)
        run: |
          flutter build apk --release --split-per-abi
          echo "Split APKs built:"
          ls -lh build/app/outputs/flutter-apk/

      - name: Build universal release APK
        run: |
          flutter build apk --release
          echo "Universal APK built:"
          ls -lh build/app/outputs/flutter-apk/app-release.apk

      - name: Rename APKs to vk-os
        run: |
          cd build/app/outputs/flutter-apk/
          mv app-arm64-v8a-release.apk   vk-os-arm64.apk   2>/dev/null || true
          mv app-armeabi-v7a-release.apk vk-os-arm32.apk   2>/dev/null || true
          mv app-release.apk             vk-os.apk          2>/dev/null || true
          echo "Renamed APKs:"
          ls -lh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vk-os-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/vk-os-arm64.apk
            build/app/outputs/flutter-apk/vk-os-arm32.apk
            build/app/outputs/flutter-apk/vk-os.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: "v1.0.${{ github.run_number }}"
          name: "VK OS v1.0.${{ github.run_number }}"
          body: |
            ## VK OS — Your Life, Organized, Intelligent.
            ### by Vishal Karpe | HiveTech

            ---

            ### Install on Android
            1. Download **`vk-os-arm64.apk`** (recommended — modern 64-bit phones)
            2. Or **`vk-os-arm32.apk`** (older / 32-bit phones)
            3. Or **`vk-os.apk`** (universal — works on all phones, larger file)
            4. On your phone: Settings → Security → **Install from unknown sources** → Enable
            5. Open the downloaded `.apk` and tap Install

            ---

            ### What's in this build
            - **Smart Notes** — add, edit, pin, search, delete notes
            - **Live Location Tracking** — real-time GPS stream (updates every 5 m of movement)
            - **Location History** — view all past locations on map; find by date & time
            - **Profile** — change username, email, password; delete account
            - **Admin Panel** (hivetech1010@gmail.com only)
              - Live map of every user's location — auto-refreshes every 30 s
              - Location playback by time slider
              - Find user location at a specific date/time
              - Edit user (username, email, password, active status)
              - Delete single or multiple users
            - **One-time location permission** — asked once at registration/first login

            ---

            **Backend:** https://vishalos-backend.onrender.com
            **Built with Flutter 3.32.4 | Signed Release APK**
          artifacts: |
            build/app/outputs/flutter-apk/vk-os-arm64.apk
            build/app/outputs/flutter-apk/vk-os-arm32.apk
            build/app/outputs/flutter-apk/vk-os.apk
          makeLatest: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
