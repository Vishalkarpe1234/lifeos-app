allprojects {
    repositories {
        // Local mirror of davidliu/audioswitch (jitpack is Cloudflare-blocked on CI)
        maven { url "${rootProject.projectDir}/libs/maven" }
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
